stages:
  - test
  - build
  - deploy

variables:
  REGISTRY_IMAGE: $CI_REGISTRY_IMAGE

test:
  stage: test
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
  script:
    - npm ci
    - npx prisma generate
    - npm test
  only:
    - merge_requests
    - main

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA -t $REGISTRY_IMAGE:latest .
    - docker push $REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $REGISTRY_IMAGE:latest
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd /opt/pickleball &&
        REGISTRY_IMAGE=$REGISTRY_IMAGE docker compose pull &&
        REGISTRY_IMAGE=$REGISTRY_IMAGE ADMIN_PASSWORD=$ADMIN_PASSWORD docker compose up -d
      "
  environment:
    name: production
  only:
    - main
